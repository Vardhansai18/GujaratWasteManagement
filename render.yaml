services:
  - type: web
    name: gujarat-waste-management
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps chromium
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 300 --workers 2 wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        generateValue: true
    autoDeploy: true
